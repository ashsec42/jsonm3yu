name: Update M3U

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write   # ✅ THIS FIXES IT

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - name: Generate M3U
        run: node generate.js
        env:
          JSON_URL: ${{ secrets.JSON_URL }}

      - name: Commit output
        run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add output.m3u
          git commit -m "update m3u" || echo "no changes"
          git push
